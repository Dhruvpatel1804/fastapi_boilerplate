version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: pipenv run uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - worker

  worker:
    build: .
    env_file:
      - .env
    command: pipenv run celery -A worker.celery_app worker --loglevel=info
    